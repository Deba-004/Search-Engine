<!DOCTYPE html>
<html>
<head>
  <title>DSA Problem Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Search Coding Problems</h1>
  <input id="query" placeholder="e.g. binary search" />
  <select id="difficulty">
    <option value="">All</option>
    <option>800</option>
    <option>900</option>
    <option>1000</option>
  </select>
  <select id="language">
    <option value="">All</option>
    <option>Python</option>
    <option>C++</option>
  </select>
  <button onclick="search()">Search</button>
  <ul id="results"></ul>
  <script src="script.js"></script>
</body>
</html>
